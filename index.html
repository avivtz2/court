    <script>

        const DEFINITIONS = {
            "הזכות לקניין": "הזכות של כל אדם להחזיק רכוש (חומרי או רוחני) ולעשות בו כרצונו, מבלי שיילקח ממנו או ייפגע ללא הסכמתו.",
            "חופש הביטוי וההפגנה": "זכותו של אדם להביע את דעותיו, אמונותיו והשקפותיו בכל דרך, לרבות התאספות פומבית ומחאה.",
            "הזכות לשוויון": "הזכות של אדם לקבל יחס שווה, ללא הפליה על רקע דת, גזע, מין, נטייה מינית או כל מאפיין שאינו רלוונטי.",
            "חופש העיסוק": "זכותו של כל אזרח או תושב לבחור ולעסוק בכל מקצוע או משלח יד שירצה, בכפוף לחוק.",
            "שלום הציבור ובטחונו": "האינטרס הציבורי להגן על חייהם, גופם ורכושם של האזרחים מפני פגיעה או אלימות.",
            "הזכות לפרטיות": "זכותו של אדם לחיות את חייו ללא חשיפה, התערבות או חדירה לחייו האישיים, למרחב הפרטי שלו ולמידע אודותיו.",
            "חופש מדת": "זכותו של אדם שלא להאמין, שלא לקיים פולחן דתי, ושלא יכפו עליו מנהגים או הלכות דתיות.",
            "חופש דת": "זכותו של אדם לבחור בדת, להאמין בה ולקיים את פולחנה, טקסיה ומנהגיה.",
            "חופש התנועה": "זכותו של אדם לנוע בחופשיות ממקום למקום בתוך המדינה, לצאת ממנה ולהיכנס אליה.",
            "הזכות לכבוד": "הזכות הבסיסית של כל אדם שלא להיות נתון ליחס משפיל, מבזה או פוגעני.",
            "חופש המידע": "זכותו של אדם לקבל מידע מרשויות השלטון על פעולותיהן, לשם פיקוח דמוקרטי ושקיפות.",
            "ביטחון המדינה": "האינטרס והחובה של המדינה להגן על קיומה ועל אזרחיה מפני איומים חיצוניים (מלחמה, טרור).",
            "אינטרס ציבורי": "ערך, מטרה או צורך המשרתים את כלל החברה, כגון פיתוח הארץ, שמירה על משאבים או סדר ציבורי.",
            "הזכות לחיים וביטחון": "הזכות הראשונית והבסיסית ביותר, להגן על חייו ושלמות גופו של אדם מפני פגיעה.",
            "זכות הציבור לדעת": "זכותה של החברה לקבל מידע מגורמים שונים על הנעשה במדינה, גם אם מדובר במידע שאינו רשמי.",
            "הזכות לשם טוב": "זכותו של אדם ששמו לא יוכפש ושלא יפרסמו עליו מידע שקרי שעלול לפגוע במעמדו.",
            "הזכות להליך הוגן": "זכותו של אדם הנמצא בהליך משפטי לקבל הגנה על זכויותיו (ייצוג, ידיעת החשדות, שופט אובייקטיבי).",
            "חופש ההתאגדות": "זכותם של בני אדם להתארגן בקבוצות (מפלגה, עמותה, ועד עובדים) כדי לקדם מטרה משותפת.",
            "דמוקרטיה מתגוננת": "זכותה של המדינה הדמוקרטית להפעיל אמצעים חוקיים נגד גורמים המנצלים את הכלים הדמוקרטיים כדי לחסל את הדמוקרטיה."
        };

        const ALL_CASES = [
            { id: 1, title: "מצעד במחלוקת", description: "ארגון מבקש לקיים תהלוכה בעיר שרוב תושביה מתנגדים לו. המשטרה מסרבת להעניק רישיון לתהלוכה בשל מידע מודיעיני על סכנה ברמת 'ודאות קרובה' לפריצת אלימות חמורה כלפי הצועדים והתושבים.", rightsOptions: ["הזכות לקניין", "חופש הביטוי וההפגנה", "הזכות לשוויון", "חופש העיסוק", "שלום הציבור ובטחונו"], correctRights: ["חופש הביטוי וההפגנה", "שלום הציבור ובטחונו"], appellant: "הארגון (העותר)", respondent: "משטרת ישראל (המשיב)", judgmentOptions: [{ id: "a", text: "לקבל את העתירה במלואה ולחייב את המשטרה לספק אבטחה מלאה למצעד בתוואי ובמועד המקוריים שביקש הארגון.", correct: false }, { id: "b", text: "לקבל את העתירה בחלקה ולהורות למשטרה לאשר את המצעד, אך בכפוף לשינויים בתוואי ההליכה ובשעת ההתכנסות כדי להקטין את החיכוך.", correct: true }, { id: "c", text: "לדחות את העתירה ולהותיר את החלטת המשטרה על כנה, תוך איסור מוחלט על קיום המצעד בעיר זו.", correct: false }], feedbackText: "בג\"ץ קבע את 'מבחן הוודאות הקרובה'. רק סכנה ודאית ומוחשית מצדיקה פגיעה בחופש ההפגנה. גם אז, חובה על המשטרה להפעיל אמצעים שפגיעתם פחותה (שינוי מסלול) לפני ביטול מוחלט.", realCase: { name: 'בג"ץ 153/83 לוי נ\' מפקד המחוז הדרומי', desc: 'פסק דין מכונן שעיגן את חופש ההפגנה ואת מבחן הוודאות הקרובה והמידתיות.' } },
            { id: 2, title: "אירוע ציבורי בהפרדה", description: "עירייה החליטה לממן אירוע תרבות בפארק ציבורי, המיועד לציבור דתי. לבקשת הקהילה, העירייה קבעה כי האירוע יתקיים בהפרדה מלאה בין גברים לנשים. עמותות ציבוריות עתרו נגד ההחלטה.", rightsOptions: ["חופש הביטוי וההפגנה", "הזכות לשוויון", "הזכות לפרטיות", "חופש דת", "ביטחון המדינה"], correctRights: ["הזכות לשוויון", "חופש דת"], appellant: "העמותות (העותרים)", respondent: "העירייה (המשיבה)", judgmentOptions: [{ id: "a", text: "לדחות את העתירה ולקבוע כי לעירייה יש סמכות בלעדית לאשר אירועים בהפרדה מגדרית לפי בקשת התושבים, בכל זמן ובכל מקום.", correct: false }, { id: "b", text: "לקבל את העתירה באופן גורף ולאסור על כל רשות מקומית לקיים אירוע ציבורי כלשהו בהפרדה מגדרית, ללא יוצא מן הכלל.", correct: false }, { id: "c", text: "לאפשר את האירוע באופן חריג בכפוף לתנאים ספציפיים: שהאירוע מיועד במובהק לקהילה זו, ושאין פגיעה במעבר חופשי של שאר הציבור בפארק.", correct: true }], feedbackText: "הפרדה במרחב ציבורי פוגעת בשוויון. עם זאת, כדי לממש את חופש הדת של ציבור ספציפי הדורש זאת, בית המשפט עשוי לאפשר הפרדה נקודתית תחת תנאים מחמירים.", realCase: { name: 'בג"ץ עפולה (עע"מ 2908/19)', desc: 'נדרש לסוגיית ההפרדה המגדרית בפארק, תוך דיון במתח שבין שוויון לזכות קהילה לתרבותה.' } },
            { id: 3, title: "מצלמות ביומטריות ברחוב", description: "כחלק ממאבק בפשיעה, המשטרה התקינה מערכת 'עין הנץ' הסורקת מספרי רכבים ופנים במרחב הציבורי ושומרת את המידע במאגר. אזרחים עתרו להסרת המערכת בהיעדר חוק מסדיר.", rightsOptions: ["הזכות לפרטיות", "הזכות לקניין", "שלום הציבור ובטחונו", "חופש התנועה", "חופש העיסוק"], correctRights: ["הזכות לפרטיות", "שלום הציבור ובטחונו"], appellant: "האזרחים (העותרים)", respondent: "המשטרה (המשיבה)", judgmentOptions: [{ id: "a", text: "לקבל את העתירה, להורות על הקפאת השימוש במערכת ומחיקת המאגר עד לחקיקת חוק מפורש של הכנסת המסדיר את הסמכויות.", correct: true }, { id: "b", text: "לדחות את העתירה ולקבוע כי זכותה של הרשות המבצעת להשתמש בכל אמצעי טכנולוגי מתקדם העומד לרשותה כדי להילחם בפשיעה.", correct: false }, { id: "c", text: "לדחות את העתירה בטענה כי צילום במרחב הפתוח והציבורי אינו מהווה פגיעה כלשהי בזכויות אזרח מאחר שאין לאדם ציפייה לפרטיות ברחוב.", correct: false }], feedbackText: "בג\"ץ פוסל שימוש באמצעים טכנולוגיים פולשניים במרחב הציבורי ללא 'הסמכה מפורשת בחוק' (עקרון חוקיות המינהל), שכן המעקב מפר את הזכות לפרטיות.", realCase: { name: 'בג"ץ 6406/21 (מערכת עין הנץ)', desc: 'בג"ץ קבע שלמשטרה אין סמכות חוקית מפורשת להפעיל מערכת מעקב המוני ללא חקיקה מתאימה.' } },
            { id: 4, title: "בניית מחלף על קרקע חקלאית", description: "המדינה מתכננת לסלול כביש מהיר חיוני להקלת עומסי תנועה כבדים. לשם כך, היא מבקשת להפקיע קרקע חקלאית פרטית מבעליה בתמורה לפיצוי כספי הוגן. הבעלים מסרב לפנות את הקרקע.", rightsOptions: ["הזכות לקניין", "חופש העיסוק", "חופש התנועה", "אינטרס ציבורי", "הזכות לכבוד"], correctRights: ["הזכות לקניין", "אינטרס ציבורי"], appellant: "בעל הקרקע (העותר)", respondent: "המדינה (המשיבה)", judgmentOptions: [{ id: "a", text: "לקבל את העתירה ולאסור על המדינה לבנות את הכביש בשטח זה, משום שאין לפגוע ברכושו של אזרח ללא הסכמתו המפורשת.", correct: false }, { id: "b", text: "לדחות את העתירה ולאשר את ההפקעה, ובלבד שהמדינה תוכיח כי התוואי נבחר בקפידה, אינו חורג מהשטח הנדרש, וניתן פיצוי הולם.", correct: true }, { id: "c", text: "לדחות את העתירה ולהורות על החרמת הקרקע ללא פיצוי כספי, לאור החשיבות הלאומית העליונה של סלילת הכביש לכלל האזרחים.", correct: false }], feedbackText: "זכות המדינה להפקיע קרקע פרטית לטובת אינטרס ציבורי (פיתוח ותשתיות), אך פעולה זו פוגעת בזכות לקניין ולכן כפופה למבחני מידתיות: צורך מוצדק, הפקעה מינימלית, ופיצוי הולם.", realCase: { name: 'בג"ץ קרסיק', desc: 'פסיקה מהותית בנושא הפקעת קרקעות וזיקת הבעלים המקורית לקרקע שהופקעה.' } },
            { id: 5, title: "איסור הכנסת חמץ לבתי חולים", description: "לקראת חג הפסח, הנהלת בתי החולים הממשלתיים הורתה למאבטחים לחפש בתיקי המבקרים ולמנוע הכנסת חמץ, כדי לשמור על כשרות המוסד. אזרחים חילונים עתרו נגד ההוראה.", rightsOptions: ["חופש התנועה", "חופש מדת", "חופש דת", "הזכות לשוויון", "שלום הציבור ובטחונו"], correctRights: ["חופש מדת", "חופש דת"], appellant: "האזרחים החילונים (העותרים)", respondent: "בתי החולים והמדינה", judgmentOptions: [{ id: "a", text: "לדחות את העתירה ולהתיר חיפוש מלא בתיקים, משום שזהו מוסד מדינה ועליו לשמור על כשרות כדי לאפשר לשומרי מסורת להתאשפז בו.", correct: false }, { id: "b", text: "לקבל את העתירה ולהורות להפסיק את חיפושי החמץ, שכן מניעת הכנסת מזון וחיפוש בתיק ללא הסמכה חוקית מהווים פגיעה אסורה בכבוד ובחופש מדת.", correct: true }, { id: "c", text: "לקבל את העתירה חלקית ולהורות על הקמת אוהלי בידוק מיוחדים מחוץ לבית החולים שבהם מבקרים יאכלו את החמץ בטרם כניסתם.", correct: false }], feedbackText: "בג\"ץ קבע כי איסור הכנסת חמץ וביצוע חיפוש בתיקי מבקרים פוגעים בזכות לאוטונומיה, בכבוד ובחופש מדת ללא הסמכה מפורשת בחוק.", realCase: { name: 'בג"ץ הכנסת חמץ לבתי חולים (1550/18)', desc: 'בג"ץ קבע שאין סמכות למאבטחים למנוע הכנסת חמץ או לערוך חיפוש בכליו של אדם לשם כך.' } },
            { id: 6, title: "פסילת מפלגה מהתמודדות", description: "ועדת הבחירות המרכזית החליטה לפסול רשימה פוליטית מהתמודדות לכנסת, בטענה שמצעה כולל קריאה מפורשת לשלילת קיומה של מדינת ישראל כמדינה יהודית ודמוקרטית. המפלגה מערערת.", rightsOptions: ["הזכות להליך הוגן", "חופש ההתאגדות", "חופש העיסוק", "דמוקרטיה מתגוננת", "הזכות לפרטיות"], correctRights: ["חופש ההתאגדות", "דמוקרטיה מתגוננת"], appellant: "המפלגה (המערערת)", respondent: "ועדת הבחירות (המשיבה)", judgmentOptions: [{ id: "a", text: "לאשר את הפסילה באופן אוטומטי בהתבסס על החלטת ועדת הבחירות הפוליטית ללא צורך בהוכחות נוספות.", correct: false }, { id: "b", text: "לקבל את הערעור ולבטל את הפסילה, משום שבמשטר דמוקרטי אסור לפסול אף מפלגה, תהא האידיאולוגיה שלה אשר תהא.", correct: false }, { id: "c", text: "לדון בחומרי הראיות ולהותיר את הפסילה על כנה רק אם קיימות ראיות משמעותיות, חד-משמעיות וברורות לכך שמטרת המפלגה היא שלילת קיום המדינה.", correct: true }], feedbackText: "הזכות לבחור ולהיבחר (וחופש ההתאגדות) היא זכות יסוד. פסילת מפלגה היא אמצעי קיצוני של 'דמוקרטיה מתגוננת' ויכולה להיעשות רק במקרים נדירים, עם ראיות מוצקות ולא על בסיס אמירות בודדות.", realCase: { name: 'ע"ב 1/65 (פסק דין ירדור) וסעיף 7א', desc: 'הבסיס ההיסטורי והחוקי לפסילת מפלגות החותרות תחת קיום המדינה או אופיה.' } },
            { id: 7, title: "שלילת תקציב מבית ספר מפריד", description: "רשת חינוך פרטית המתוקצבת על ידי המדינה הנהיגה מדיניות שלא לקבל תלמידות ממוצא עדתי מסוים בשל 'פערי השקפה דתית'. משרד החינוך החליט לשלול את תקציבי הרשת.", rightsOptions: ["הזכות לשוויון", "חופש דת", "הזכות לקניין", "חופש הביטוי", "חופש המידע"], correctRights: ["הזכות לשוויון", "חופש דת"], appellant: "רשת החינוך (העותרת)", respondent: "משרד החינוך (המשיבה)", judgmentOptions: [{ id: "a", text: "לדחות את העתירה ולאשר את הפסקת התקצוב, תוך קביעה שמוסד הנהנה מכספי ציבור אינו רשאי להפלות תלמידים על רקע עדתי באצטלא דתית.", correct: true }, { id: "b", text: "לקבל את העתירה ולחייב את השבת התקציבים, מאחר ומדובר בחינוך פרטי וזכותו לקבוע את הקריטריונים לקבלה על פי אמונתו.", correct: false }, { id: "c", text: "לדחות את העתירה ולהורות בנוסף על סגירה מיידית של כלל מוסדות החינוך הפרטיים במדינה והפיכתם לממלכתיים.", correct: false }], feedbackText: "אפליה על רקע עדתי מנוגדת לחוק ולעקרון השוויון. גם מוסד המפעיל 'אוטונומיה חינוכית' בשם חופש הדת, אינו יכול לקבל מימון מדינה כאשר הוא מפר זכויות יסוד בוטות.", realCase: { name: 'בג"ץ עמנואל (1067/08)', desc: 'פסיקה תקדימית נגד אפליית תלמידות ממוצא מזרחי בבית ספר חרדי בעמנואל.' } },
            { id: 8, title: "פרסום תחקיר על פדיחה מבצעית", description: "עיתון חוקר מבקש לפרסם תחקיר על מחדל כבד של כוחות הביטחון במהלך פעולה צבאית. הצנזורה הצבאית אוסרת על פרסום התחקיר בטענה שהדבר יפגע במורל הלאומי ויחשוף שיטות.", rightsOptions: ["חופש העיסוק", "זכות הציבור לדעת", "ביטחון המדינה", "הזכות לפרטיות", "הזכות להליך הוגן"], correctRights: ["זכות הציבור לדעת", "ביטחון המדינה"], appellant: "העיתון (העותר)", respondent: "הצנזורה הצבאית (המשיבה)", judgmentOptions: [{ id: "a", text: "לדחות את העתירה ולקבוע כי כל החלטה של הצנזורה הצבאית היא סופית ואינה נתונה לביקורת שיפוטית.", correct: false }, { id: "b", text: "לקבל את העתירה באופן מלא ולהתיר פרסום גורף של כלל החומרים, מאחר וזכות הציבור לדעת על מחדלים קודמת לכל שיקול.", correct: false }, { id: "c", text: "להתיר את פרסום התחקיר בכפוף להשחרת שמות ופרטים טקטיים העלולים לשרת את האויב, כיוון שמניעת פרסום מותרת רק במקרה של ודאות קרובה לפגיעה בביטחון.", correct: true }], feedbackText: "לצנזורה יש סמכות לאסור פרסום רק כאשר מתקיים 'מבחן הוודאות הקרובה' לפגיעה ממשית בביטחון המדינה, ולא לשם מניעת פגיעה במורל או הסתרת מחדלים.", realCase: { name: 'בג"ץ שניצר (680/88)', desc: 'בג"ץ החיל לראשונה את מבחן הוודאות הקרובה על החלטות הצנזור הצבאי הראשי.' } },
            { id: 9, title: "מעצר מנהלי לפעיל טרור", description: "שר הביטחון חתם על צו מעצר מנהלי לצעיר החשוד בתכנון פיגוע, בטענה שחשיפת הראיות בבית משפט תשרוף מקורות. החשוד עותר לשחרורו בשל היעדר משפט.", rightsOptions: ["הזכות להליך הוגן", "הזכות לקניין", "ביטחון המדינה", "חופש העיסוק", "זכות הציבור לדעת"], correctRights: ["הזכות להליך הוגן", "ביטחון המדינה"], appellant: "החשוד (העותר)", respondent: "שר הביטחון (המשיב)", judgmentOptions: [{ id: "a", text: "לדחות את העתירה ולאשר את הצו, בתנאי ששופט בחן את החומר החסוי במעמד צד אחד ושוכנע כי קיימת סכנה חמורה ומיידית לביטחון המדינה.", correct: true }, { id: "b", text: "לקבל את העתירה ולשחרר מיד את החשוד, תוך קביעה כי מעצר ללא משפט פומבי מנוגד לחלוטין לחוק הבינלאומי ולדמוקרטיה.", correct: false }, { id: "c", text: "לדחות את העתירה ולקבוע כי לשר הביטחון סמכות מוחלטת לעצור כל אדם ללא צורך באישור או ביקורת שיפוטית.", correct: false }], feedbackText: "מעצר מנהלי פוגע אנושות בזכות להליך הוגן ולחירות. הוא מותר בדמוקרטיה מתגוננת רק במצבי חירום ביטחוניים קיצוניים, וכפוף תמיד לביקורת שיפוטית (שופט הבוחן את הראיות החסויות).", realCase: { name: 'פסיקות בנושא מעצרים מנהליים', desc: 'בג"ץ מאשר מעצרים מנהליים אך דורש עילת מסוכנות אינדיבידואלית חמורה ופיקוח שיפוטי רציף.' } },
            { id: 10, title: "מכירת בשר חזיר בעיר", description: "רשות מקומית חוקקה חוק עזר האוסר כליל על פתיחת חנויות לממכר בשר חזיר ברחבי העיר כולה, לשם שמירה על צביון דתי. בעל מעדנייה עתר נגד החוק הפוגע בפרנסתו.", rightsOptions: ["חופש התנועה", "חופש העיסוק", "ביטחון המדינה", "אינטרס ציבורי", "חופש מדת"], correctRights: ["חופש העיסוק", "אינטרס ציבורי"], appellant: "בעל המעדנייה (העותר)", respondent: "הרשות המקומית", judgmentOptions: [{ id: "a", text: "לדחות את העתירה ולקבוע שסמכות העירייה לעצב את המרחב הציבורי לפי ערכי הדת גוברת על כל שיקול מסחרי.", correct: false }, { id: "b", text: "לקבל את העתירה ולהורות על ביטול חוק העזר, משום שאיסור גורף ברחבי כל העיר מהווה פגיעה בלתי סבירה בחופש העיסוק של הסוחרים ובחופש מדת של התושבים.", correct: true }, { id: "c", text: "לדחות את העתירה בתנאי שהעירייה תשלם קצבה חודשית קבועה לבעלי החנויות שנסגרו כפיצוי על אובדן ההכנסה.", correct: false }], feedbackText: "חקיקה מטעמי דת כפופה לחוקי היסוד. בית המשפט פסק (פסק דין סולודקין) שחוק עזר יכול להגביל מכירה רק באזורים ספציפיים בעלי רוב דתי מובהק. איסור גורף בכל העיר פוסל את המידתיות.", realCase: { name: 'בג"ץ סולודקין (בשר חזיר)', desc: 'בג"ץ קבע כי חוקי עזר עירוניים בנושא מכירת חזיר צריכים להיות מיושמים בהתאם לאופי השכונות (סובלנות הדדית).' } },
            { id: 11, title: "הריסת בית מחבל", description: "אלוף הפיקוד הוציא צו הריסה לבית משפחתו של מחבל שביצע פיגוע. המשפחה, שלטענתה לא ידעה על תוכניותיו, עותרת נגד הריסת קורת הגג שלה כצעד ענישתי.", rightsOptions: ["הזכות לקניין", "ביטחון המדינה", "הזכות לשוויון", "חופש הביטוי וההפגנה", "חופש העיסוק"], correctRights: ["הזכות לקניין", "ביטחון המדינה"], appellant: "משפחת המחבל (העותרים)", respondent: "צה\"ל (המשיב)", judgmentOptions: [{ id: "a", text: "לאשר את ההריסה בכפוף לכך שתוגבל רק לחלק היחסי בבית שבו התגורר המחבל בפועל, לשם השגת הרתעה ולא כענישה קולקטיבית.", correct: true }, { id: "b", text: "לקבל את העתירה ולבטל את הצו לחלוטין, שכן פגיעה ברכוש משפחה על מעשי בנה אסורה בתכלית על פי החוק הפלילי.", correct: false }, { id: "c", text: "לדחות את העתירה ולהורות על הריסת הבית כולו ואף שכונות סמוכות לשם העברת מסר תקיף נגד טרור.", correct: false }], feedbackText: "בג\"ץ מאשר שימוש בתקנה 119 (הריסת בתים) לצורכי הרתעה ביטחונית בלבד. עם זאת, הוא דורש הוכחת מידתיות: צמצום הפגיעה רק לחדרו של המחבל אם ניתן, ומתן זכות טיעון למשפחה.", realCase: { name: 'עתירות הריסת בתים (תקנה 119)', desc: 'בג"ץ שב ומאשר את סמכות ההריסה ההרתעתית תוך צמצום היקפה כדי למזער פגיעה בבלתי מעורבים.' } },
            { id: 12, title: "פרסום שם חשוד", description: "איש עסקים מוכר נעצר בחשד למרמה. המשטרה מבקשת לפרסם את שמו ברבים כדי לאתר קורבנות נוספים. החשוד דורש צו איסור פרסום לאור חזקת החפות וכדי להגן על המוניטין שלו.", rightsOptions: ["הזכות לשם טוב", "זכות הציבור לדעת", "הזכות לקניין", "חופש העיסוק", "שלום הציבור ובטחונו"], correctRights: ["הזכות לשם טוב", "זכות הציבור לדעת"], appellant: "החשוד (העותר)", respondent: "המשטרה (המשיבה)", judgmentOptions: [{ id: "a", text: "לדחות את הבקשה ולהתיר את פרסום השם, מתוך הנחה שיש עניין ציבורי מהותי וצורך חקירתי באיתור מתלוננים נוספים.", correct: true }, { id: "b", text: "לקבל את הבקשה ולאסור על פרסום שמו של כל אדם שטרם הורשע בדין חלוט, שכן חזקת החפות גוברת על כל שיקול תקשורתי.", correct: false }, { id: "c", text: "לקבל את הבקשה ולחייב את המשטרה לשלם לחשוד פיצויים מראש על עצם הבקשה לפרסם את שמו.", correct: false }], feedbackText: "התנגשות בין הזכות לשם טוב מול זכות הציבור לדעת והאינטרס החקירתי. על פי חוק, ניתן לפרסם שם חשוד לאחר 48 שעות ממעצרו, אלא אם בית משפט אישר צו איסור משום שיוגרם לו נזק חריג והפרסום אינו חיוני.", realCase: { name: 'דיני איסור פרסום שמות חשודים', desc: 'החוק בישראל מאזן: איסור פרסום אוטומטי ל-48 שעות, ולאחר מכן הכלל הוא פומביות אלא אם הוכח נזק חמור בהרבה מהאינטרס הציבורי.' } },
            { id: 13, title: "סירוב לאפות עוגה מטעמי דת", description: "קונדיטור דתי סירב לקבל הזמנה לאפיית עוגת חתונה לזוג מאותו מין, בטענה שהדבר סותר את מצפונו ואמונתו. הזוג תבע את בעל העסק על אפליה במתן שירות ציבורי.", rightsOptions: ["הזכות לשוויון", "חופש העיסוק", "הזכות לחיים וביטחון", "חופש דת", "הזכות להליך הוגן"], correctRights: ["הזכות לשוויון", "חופש דת"], appellant: "בני הזוג (העותרים)", respondent: "הקונדיטור (המשיב)", judgmentOptions: [{ id: "a", text: "לקבל את התביעה ולקבוע כי חוק איסור אפליה במוצרים אוסר על עסק הפתוח לציבור למנוע שירות בשל נטייה מינית, ועל כן עליו לפצות את הזוג.", correct: true }, { id: "b", text: "לדחות את התביעה, מכיוון שחופש העיסוק וזכות הקניין מקנים לבעל עסק פרטי זכות מוחלטת להחליט את מי לשרת.", correct: false }, { id: "c", text: "לדחות את התביעה, שכן במדינת ישראל חופש הדת מתיר לכל אזרח להימנע ממתן שירות לאנשים שאינם שומרים על ההלכה.", correct: false }], feedbackText: "חוק איסור הפליה במוצרים ובשירותים קובע שמרגע שעסק פותח שעריו לציבור, עליו להעניק שירות שוויוני (כולל היעדר אפליה על רקע נטייה מינית). עקרון השוויון במרחב המסחרי הציבורי גובר במקרה זה על חופש הדת של בעל העסק הפרטי.", realCase: { name: 'פסיקות בתי משפט (כגון דפוס בארי)', desc: 'בתי משפט השלום פסקו כי סירוב להעניק שירות בשל נטייה מינית מהווה עבירה על חוק איסור הפליה, וחייבו בפיצויים.' } },
            { id: 14, title: "מואזין לפנות בוקר", description: "תושבי שכונה הסמוכה למסגד עתרו בדרישה לאסור את השמעת קריאות המואזין ברמקולים בשעה 04:00 בבוקר, בטענה למטרד רעש בלתי נסבל הפוגע בשנתם.", rightsOptions: ["חופש הביטוי וההפגנה", "אינטרס ציבורי", "חופש דת", "חופש מדת", "הזכות לקניין"], correctRights: ["אינטרס ציבורי", "חופש דת"], appellant: "התושבים (העותרים)", respondent: "המסגד (המשיב)", judgmentOptions: [{ id: "a", text: "לדחות את העתירה לחלוטין בנימוק שחופש הדת והפולחן הוא ערך עליון שאין בסמכות המדינה להגבילו.", correct: false }, { id: "b", text: "לקבל את העתירה חלקית ולהורות על הפחתת עוצמת הרמקולים בשעות המנוחה, בהתאם לדרישות החוק למניעת מפגעים סביבתיים.", correct: true }, { id: "c", text: "לקבל את העתירה במלואה ולהורות על סגירת המסגד בשל הפרת הסדר הציבורי והתססת השכונה.", correct: false }], feedbackText: "התנגשות בין חופש הפולחן והדת לבין זכות הציבור לסביבה שקטה (שלום הציבור / איכות חיים). הפתרון הדמוקרטי מתמקד בהסדרה מידתית - לא איסור הפולחן, אלא הגבלת עוצמת הדציבלים או השעות למניעת פגיעה באחר.", realCase: { name: 'חוק מניעת מפגעים (רעש)', desc: 'יישום החוק והפסיקה קובע קריטריונים אובייקטיביים לעוצמת רעש מותרת, החלים על כלל מוסדות הדת והציבור.' } },
            { id: 15, title: "נשות הכותל", description: "קבוצת נשים מבקשת להתפלל ברחבת הכותל כשהן עטופות בטליתות וקוראות בתורה. רב הכותל מסרב לאפשר זאת מחשש לתגובה אלימה מצד המתפללים האורתודוקסים ולפגיעה ברגשותיהם.", rightsOptions: ["הזכות לשוויון", "אינטרס ציבורי", "שלום הציבור ובטחונו", "חופש דת", "חופש העיסוק"], correctRights: ["חופש דת", "שלום הציבור ובטחונו"], appellant: "נשות הכותל (העותרות)", respondent: "רב הכותל והמדינה", judgmentOptions: [{ id: "a", text: "לדחות את העתירה כדי למנוע אלימות, ולאסור כליל על הגעת נשות הכותל לרחבה מחשש לשלום הציבור.", correct: false }, { id: "b", text: "להורות למדינה לאפשר את התפילה במתחם ייעודי ומכובד הסמוך לכותל ('עזרת ישראל'), תוך שמירה על הסדר ברחבה האורתודוקסית המרכזית.", correct: true }, { id: "c", text: "לקבל את העתירה ולהורות על ביטול מיידי של כל המחיצות בכותל ויצירת רחבה מעורבת אחת לכולם.", correct: false }], feedbackText: "בית המשפט נדרש למצוא איזון שיכבד את חופש הדת של העותרות (להתפלל כדרכן), אך יגן על שלום הציבור וימנע פגיעה קיצונית ברגשות הרוב האורתודוקסי במקום. הקצאת רחבה חלופית (מתווה הכותל) היא ניסיון לפתרון מידתי.", realCase: { name: 'בג"ץ הופמן (נשות הכותל)', desc: 'בג"ץ הכיר בזכותן העקרונית של הנשים להתפלל כמנהגן, אך הורה לממשלה למצוא הסדר פיזי שיימנע אלימות קשה.' } },
            { id: 16, title: "מעקב סלולרי במגפה", description: "במהלך מגפה, הפעילה הממשלה תקנות שעת חירום המסמיכות את השב\"כ לעקוב אחר מיקומם של אזרחים מודבקים, ללא צו שופט, כדי לאתר אנשים שבאו עמם במגע. ארגוני אזרחים עתרו לביטול המעקב.", rightsOptions: ["הזכות לפרטיות", "הזכות לחיים וביטחון", "חופש התנועה", "הזכות לקניין", "חופש העיסוק"], correctRights: ["הזכות לפרטיות", "הזכות לחיים וביטחון"], appellant: "ארגוני הזכויות", respondent: "הממשלה", judgmentOptions: [{ id: "a", text: "להורות על הפסקת השימוש בתקנות שעת חירום למטרה זו, ולקבוע שפגיעה כה נרחבת בפרטיות מחייבת חקיקה ראשית ופיקוח פרלמנטרי של הכנסת.", correct: true }, { id: "b", text: "לאשר את התקנות ללא הגבלת זמן, משום שבמצבי חירום רפואיים מסוכנים מתבטלות מאליהן זכויות האדם.", correct: false }, { id: "c", text: "לדחות את העתירה, שכן לשב\"כ סמכות קבועה ומולדת לעקוב אחר אזרחים לשם שמירה על ביטחון הציבור.", correct: false }], feedbackText: "הגבלת זכויות יסוד (כמו פרטיות) מותרת כדי להגן על חיי אדם. עם זאת, במדינה דמוקרטית לא ניתן לעקוף את הרשות המחוקקת לאורך זמן. פגיעה כה משמעותית דורשת חוק מפורש של הכנסת ומנגנוני בקרה (מידתיות).", realCase: { name: 'בג"ץ איכוני השב"כ (2109/20)', desc: 'בג"ץ פסק שהממשלה אינה יכולה להמשיך להשתמש בתקנות חירום למעקב, וחייב אותה לעבור מסלול של חקיקה ראשית בכנסת.' } },
            { id: 17, title: "ייצוג נשים בדירקטוריונים", description: "חוק קובע חובה למנות נשים לדירקטוריונים של חברות ממשלתיות עד להגעה לייצוג הולם. גבר שמועמדותו נפסלה בשל העדפת אישה (בעלת כישורים דומים) עתר בטענה לאפליה.", rightsOptions: ["הזכות לשוויון", "חופש העיסוק", "חופש התנועה", "אינטרס ציבורי", "ביטחון המדינה"], correctRights: ["הזכות לשוויון", "חופש העיסוק"], appellant: "המועמד הגבר", respondent: "המדינה (רשות החברות)", judgmentOptions: [{ id: "a", text: "לקבל את העתירה ולבטל את החוק, שכן כל העדפה על בסיס מגדר היא אפליה פסולה במשפט הישראלי.", correct: false }, { id: "b", text: "לדחות את העתירה ולהכשיר את פסילת הגבר, שכן מדובר בהעדפה מתקנת שנועדה לקדם שוויון מהותי ולתקן פערים היסטוריים בייצוג נשים.", correct: true }, { id: "c", text: "לקבל את העתירה ולחייב את החברה להקים תקן נוסף במיוחד עבור הגבר כדי לא לפגוע בפרנסתו.", correct: false }], feedbackText: "העדפה מתקנת אינה הפליה פסולה. זוהי מדיניות זמנית המעדיפה נציגים מקבוצה מקופחת (כאשר הכישורים דומים), במטרה לצמצם פערים ולהשיג 'שוויון מהותי' בחברה.", realCase: { name: 'בג"ץ שדולת הנשים (453/94)', desc: 'בג"ץ ביטל מינוי של דירקטורים גברים וחייב את השרים לבחון אקטיבית מינוי נשים, תוך עיגון ההעדפה המתקנת במשפט.' } },
            { id: 18, title: "הפגנה ליד מעון בכיר", description: "קבוצת אזרחים החלה לקיים הפגנות שבועיות רועשות במרחק של מטרים ספורים מביתו הפרטי של היועץ המשפטי לממשלה. בני משפחתו ושכניו דורשים מהמשטרה להרחיק את המפגינים.", rightsOptions: ["חופש הביטוי וההפגנה", "הזכות לפרטיות", "הזכות לקניין", "חופש העיסוק", "חופש דת"], correctRights: ["חופש הביטוי וההפגנה", "הזכות לפרטיות"], appellant: "שכני איש הציבור", respondent: "המשטרה והמפגינים", judgmentOptions: [{ id: "a", text: "לאשר למפגינים להפגין מול דלת הבית ללא הגבלה, שכן איש ציבור מוותר באופן מלא על פרטיותו.", correct: false }, { id: "b", text: "לאסור כליל על כל סוג של הפגנה בשכונות מגורים ברחבי הארץ, ללא קשר לזהות המתגוררים בהן.", correct: false }, { id: "c", text: "להורות על הרחקת ההפגנה למרחק של מספר רחובות ולהגביל את שעות הרעש, כדי לאזן בין זכות המחאה לזכות משפחתו לפרטיות ומנוחה.", correct: true }], feedbackText: "הזכות להפגין נגד נושא משרה מובטחת, אך הפגנה מול מעון פרטי פוגעת בפרטיות משפחתו ושכניו (שאינם אנשי ציבור). בג\"ץ דורש למצוא חלופה מידתית: הפגנה בכיכר קרובה, תחת מגבלות זמנים ודציבלים.", realCase: { name: 'בג"ץ צמח / בג"ץ מני נפתלי', desc: 'פסיקות המסדירות מתי ובאילו תנאים ניתן להפגין סמוך למעונם הפרטי של אישי ציבור.' } },
            { id: 19, title: "הזנת כפייה לאסיר", description: "אסיר ביטחוני פתח בשביתת רעב במחאה על מעצרו, וחייו בסכנה מיידית. המדינה מבקשת מבית המשפט לאשר 'הזנת כפייה' להצלת חייו, למרות סירובו הנחרץ של האסיר לטיפול.", rightsOptions: ["הזכות לכבוד", "הזכות לחיים וביטחון", "חופש דת", "הזכות לקניין", "אינטרס ציבורי"], correctRights: ["הזכות לכבוד", "הזכות לחיים וביטחון"], appellant: "המדינה", respondent: "האסיר הביטחוני", judgmentOptions: [{ id: "a", text: "לאשר למדינה לבצע הזנת כפייה כמוצא אחרון, לאור קדושת החיים והאינטרס הציבורי למנוע פגיעה בביטחון העלולה לפרוץ אם האסיר ימות במשמורת המדינה.", correct: true }, { id: "b", text: "לדחות את הבקשה ולקבוע שזכותו המוחלטת של כל אסיר במתקן כליאה להתאבד, ועל השב\"ס חל איסור להתערב.", correct: false }, { id: "c", text: "לאשר התערבות רפואית בכפייה רק אם מדובר באזרח ישראלי בעל תעודת זהות כחולה.", correct: false }], feedbackText: "התנגשות דרמטית בין הזכות לאוטונומיה על הגוף (הזכות לכבוד) לבין הערך של קדושת החיים והשמירה על שלום הציבור. החוק בישראל מאפשר לבית משפט להתיר הזנת כפייה אם נשקפת סכנת חיים ממשית או סכנה חמורה לביטחון המדינה.", realCase: { name: 'בג"ץ חוק מניעת נזקי שביתת רעב (5382/15)', desc: 'בג"ץ קבע כי החוק מאוזן וחוקתי, ונועד להגן על חיי אדם ולמנוע תסיסה ביטחונית.' } },
            { id: 20, title: "גירוש תומך חרם בינלאומי", description: "אזרח זר, המשמש כפעיל מרכזי בארגון בינלאומי הקורא לחרם על ישראל (BDS), נחת בנתב\"ג. שר הפנים הפעיל סמכות חוקית ומנע את כניסתו. האזרח הזר עותר בטענה לפגיעה בחופש הביטוי הפוליטי.", rightsOptions: ["חופש הביטוי וההפגנה", "ביטחון המדינה", "חופש העיסוק", "דמוקרטיה מתגוננת", "הזכות לפרטיות"], correctRights: ["חופש הביטוי וההפגנה", "דמוקרטיה מתגוננת"], appellant: "האזרח הזר", respondent: "שר הפנים (המדינה)", judgmentOptions: [{ id: "a", text: "לקבל את העתירה ולאפשר כניסה, שכן חופש הביטוי אוסר על מדינה למנוע כניסת אדם רק בשל דעותיו ופעילותו הפוליטית בעולם.", correct: false }, { id: "b", text: "לדחות את העתירה ולהותיר את הגירוש, תוך קביעה שלמדינה ריבונית הזכות למנוע כניסת זרים הפועלים אקטיבית לפגוע בכלכלתה ובקיומה (דמוקרטיה מתגוננת).", correct: true }, { id: "c", text: "לדחות את העתירה ולהורות בנוסף לשלול אזרחות ישראלית מכל תושב המביע דעה דומה בארץ.", correct: false }], feedbackText: "למדינה יש שיקול דעת רחב מי רשאי להיכנס בשעריה (בניגוד לאזרחיה). החוק למניעת כניסת תומכי חרם אושר על ידי בג\"ץ כביטוי לעקרון 'הדמוקרטיה המתגוננת', המאפשר למדינה להגן על עצמה מפני הפועלים לפגוע בה מבחוץ.", realCase: { name: 'בג"ץ לארה אל-קאסם (ובג"ץ חוק החרם)', desc: 'אמנם במקרה הספציפי ההוא התיר כניסת סטודנטית, אך בג"ץ אישר עקרונית מניעת כניסה של פעילי ליבה בארגוני חרם.' } },
            { id: 21, title: "שלטי צניעות ברחוב", description: "בשכונה בעלת רוב מוחלט של תושבים חרדים, נתלו שלטים הקוראים לנשים שלא לעבור ברחוב הראשי, או לעבור בו בלבוש צנוע בלבד. נשים חילוניות עתרו נגד העירייה בדרישה להסיר את השלטים.", rightsOptions: ["הזכות לכבוד", "חופש התנועה", "חופש דת", "אינטרס ציבורי", "ביטחון המדינה"], correctRights: ["חופש התנועה", "חופש דת"], appellant: "הנשים העותרות", respondent: "העירייה", judgmentOptions: [{ id: "a", text: "לדחות את העתירה ולהותיר את השלטים, בנימוק שזוהי זכותה הבלעדית של הקהילה להגדיר את נורמות ההתנהגות בשטח מגוריה המובהק.", correct: false }, { id: "b", text: "לקבל את העתירה ולהורות למשטרה ולעירייה להסיר את השלטים, מכיוון שדרישה מנשים להדיר רגליהן ממרחב ציבורי פוגעת אנושות בשוויון, בכבוד ובחופש התנועה.", correct: true }, { id: "c", text: "לקבל את העתירה בחלקה ולהתיר תליית שלטים כאלו, אך רק אם העירייה תתלה שלטים דומים המכוונים להתנהגות גברים.", correct: false }], feedbackText: "בית המשפט קבע ששלטים המורים לנשים היכן ללכת או כיצד להתלבש במרחב ציבורי (אף בשכונה דתית) הם בלתי חוקיים, ומהווים פגיעה קשה וחמורה בזכות לשוויון ולכבוד (הדרת נשים).", realCase: { name: 'בג"ץ שלטי הצניעות בבית שמש (230/10)', desc: 'בג"ץ חייב את העירייה והמשטרה לבצע אכיפה יומיומית להסרת השלטים הפוגעניים.' } },
            { id: 22, title: "שביתת רופאים כוללת", description: "הסתדרות הרפואית הכריזה על שביתה כללית של שבוע בכל בתי החולים במחאה על שחיקת שכר ותנאי העסקה. הממשלה דורשת להוציא 'צווי ריתוק' שיחייבו את הרופאים לשוב למחלקות מחשש לפגיעה בחולים.", rightsOptions: ["חופש ההתאגדות", "חופש העיסוק", "הזכות לחיים וביטחון", "הזכות לקניין", "חופש התנועה"], correctRights: ["חופש ההתאגדות", "הזכות לחיים וביטחון"], appellant: "הממשלה / המטופלים", respondent: "ההסתדרות הרפואית", judgmentOptions: [{ id: "a", text: "להוציא צווי ריתוק או מניעה שיחזירו רופאים לעבודה במתכונת שבת/חירום, כדי למנוע סכנת חיים מיידית לאזרחים, תוך פגיעה מוגבלת בזכות השביתה.", correct: true }, { id: "b", text: "לאפשר את השביתה במלואה מבלי להתערב, שכן חופש ההתאגדות וזכות השביתה הם ערכים מוחלטים בדמוקרטיה וביחסי עבודה.", correct: false }, { id: "c", text: "להורות על מעצרם של ראשי ועד הרופאים בשל סיכון חיי אדם, ופיטורים לאלתר של כל רופא שלא יתייצב למשמרת.", correct: false }], feedbackText: "זכות השביתה היא זכות יסוד הנובעת מחופש ההתאגדות. עם זאת, כאשר שביתה בשירות חיוני (כמו בתי חולים, חשמל) גורמת לסכנת חיים או נזק לא-מידתי לחברה, בתי הדין מתערבים ומוציאים צווים המחזירים את העובדים לעבודה תחת מתכונת מצומצמת.", realCase: { name: 'צווי מניעה בבית הדין לעבודה', desc: 'כלי מקובל במשפט העבודה הישראלי לאיזון בין זכויות ארגוני עובדים לפגיעה בציבור הרחב.' } },
            { id: 23, title: "חיטוט במייל של עובד", description: "עובד פוטר לאחר שמעסיקו נכנס בחשאי ותוך שימוש בסיסמת מנהל לתיבת הדואר האלקטרוני שסיפק לעובד (תיבה מקצועית), וגילה שם הודעות פרטיות חמורות. העובד תובע את המעסיק.", rightsOptions: ["הזכות לפרטיות", "הזכות לקניין", "חופש העיסוק", "הזכות לשוויון", "זכות הציבור לדעת"], correctRights: ["הזכות לפרטיות", "הזכות לקניין"], appellant: "העובד (התובע)", respondent: "המעסיק (הנתבע)", judgmentOptions: [{ id: "a", text: "לקבל את התביעה ולקבוע כי המעסיק פגע בפרטיות העובד, שכן קריאת תוכן של מייל אישי (אף אם הוא על שרת החברה) דורשת את הסכמתו המפורשת והחופשית של העובד.", correct: true }, { id: "b", text: "לדחות את התביעה בטענה שתיבת המייל, המחשב והרשת הם רכוש החברה (הזכות לקניין), ולכן למעסיק זכות מלאה לעיין בהם כרצונו בכל עת.", correct: false }, { id: "c", text: "לדחות את התביעה מכיוון שאדם במקום עבודתו מוותר על פרטיותו ומחויב לשקיפות מוחלטת כלפי ההנהלה.", correct: false }], feedbackText: "בית הדין הארצי לעבודה (הלכת איסקוב) פסק שעל אף ששרת הדואר שייך למעסיק, לעובד עדיין שמורה הזכות לפרטיות. המעסיק אינו רשאי להיכנס להודעות פרטיות ללא הסכמה ספציפית ומדעת.", realCase: { name: 'הלכת איסקוב (ע"ע 90/08)', desc: 'פסיקה ענפה שהגדירה מחדש את גבולות הזכות לפרטיות של עובד בתיבות דואר ובמחשב בעבודה.' } },
            { id: 24, title: "סימון מוצרי התנחלויות", description: "ארגון צרכנים דורש ממשרד הכלכלה לחייב יצרנים מאזורי יהודה ושומרון לסמן את מוצריהם באופן בולט, כדי שהצרכן יבצע קנייה מודעת. היצרנים מתנגדים מחשש לחרם מסחרי.", rightsOptions: ["חופש העיסוק", "זכות הציבור לדעת", "הזכות לפרטיות", "ביטחון המדינה", "חופש ההתאגדות"], correctRights: ["חופש העיסוק", "זכות הציבור לדעת"], appellant: "ארגון הצרכנים", respondent: "היצרנים / משרד הכלכלה", judgmentOptions: [{ id: "a", text: "לדחות את העתירה ולקבוע כי ליצרן קיימת זכות מלאה להסתיר את מקום הייצור כדי למנוע חרמות שפוגעים אנושות בחופש העיסוק שלו.", correct: false }, { id: "b", text: "לקבל את העתירה ולהורות על סימון ברור של ארץ/אזור הייצור, משום שזכות הצרכן למידע חיוני להחלטת קנייה חופשית גוברת על הפגיעה המסחרית האפשרית ביצרן.", correct: true }, { id: "c", text: "לאסור כליל על שיווק מוצרים מאזורי מחלוקת בתוך תחומי הקו הירוק עד למציאת פתרון מדיני.", correct: false }], feedbackText: "דיני הגנת הצרכן מבוססים על גילוי נאות ושקיפות. זכותו של הצרכן לדעת היכן ייוצר המוצר ולבחור אם לרכוש אותו (מכל סיבה שהיא) גוברת לרוב על האינטרס הכלכלי של היצרן לשמור על אנונימיות.", realCase: { name: 'חוק הגנת הצרכן ופסקי דין על שקיפות וסימון', desc: 'החוק מחייב סימון ארץ ומיקום ייצור מדויק כחלק מזכות הציבור (הצרכן) לדעת.' } },
            { id: 25, title: "השבת קרקע מופקעת", description: "רשות מקומית הפקיעה לפני 25 שנה שטח פרטי כדי להקים עליו תחנת משטרה. בפועל, היא זנחה את התוכנית והשטח נותר שומם ומוזנח. בעל הקרקע דורש לקבל חזרה את אדמתו.", rightsOptions: ["הזכות לקניין", "אינטרס ציבורי", "הזכות לכבוד", "חופש העיסוק", "הזכות לשוויון"], correctRights: ["הזכות לקניין", "אינטרס ציבורי"], appellant: "בעל הקרקע המקורי", respondent: "הרשות המקומית", judgmentOptions: [{ id: "a", text: "לדחות את העתירה ולקבוע שברגע שרשות שלטונית מפקיעה קרקע, הבעלים המקורי מאבד כל קשר חוקי אליה לנצח.", correct: false }, { id: "b", text: "לקבל את העתירה ולהורות על השבת הקרקע, תוך קביעה שאם המטרה הציבורית שלשמה הופקעה הקרקע פוקעת או נזנחת למשך שנים, ההצדקה לפגיעה בקניין מתבטלת.", correct: true }, { id: "c", text: "לדחות את העתירה ולהתיר לעירייה למכור את הקרקע ליזמי נדל\"ן פרטיים להעשרת הקופה הציבורית כראות עיניה.", correct: false }], feedbackText: "פסק דין קרסיק חולל מהפכה בדיני הקניין: בג\"ץ קבע כי לבעלים יש 'זיקה מתמשכת' לקרקע שהופקעה ממנו. אם המדינה זונחת את הצורך הציבורי שעמד בבסיס ההפקעה, עליה להשיב את הקרקע לבעליה.", realCase: { name: 'בג"ץ קרסיק נ\' מינהל מקרקעי ישראל', desc: 'הלכה הקובעת שהפקעת קרקע צמודה למטרה הציבורית שלה היא יועדה.' } },
            { id: 26, title: "פוליגרף מחייב לעובדי מדינה", description: "שר בממשלה הוציא הנחיה המחייבת את כל פקידי משרדו (שאינם עוסקים בביטחון) לעבור בדיקת פוליגרף שנתית, מחשש להדלפות לתקשורת. העובדים מסרבים ופונים לבית הדין.", rightsOptions: ["הזכות לפרטיות", "הזכות לכבוד", "שלום הציבור ובטחונו", "אינטרס ציבורי", "הזכות להליך הוגן"], correctRights: ["הזכות לפרטיות", "אינטרס ציבורי"], appellant: "ועד העובדים", respondent: "השר הממונה", judgmentOptions: [{ id: "a", text: "לקבל את העתירה ולבטל את ההנחיה, משום שחיוב גורף בפוליגרף לעובדים אזרחיים, ללא חשד ספציפי וללא חוק מפורש, מהווה חדירה בלתי נסבלת לפרטיותם וכבודם.", correct: true }, { id: "b", text: "לדחות את העתירה ולאשר את ההנחיה, כיוון שמניעת הדלפות היא אינטרס ניהולי לגיטימי של השר העומד בראש המערכת.", correct: false }, { id: "c", text: "לדחות את העתירה ולהתיר פיטורים מיידיים (ללא פיצויים) של כל פקיד שיסרב להתחבר למכונת האמת.", correct: false }], feedbackText: "בדיקת פוליגרף חודרת לנבכי נפשו של אדם ולגופו. פסיקת בתי הדין אוסרת לחייב עובד במערכת אזרחית לעבור בדיקה כזו או לפטרו בגין סירוב, אלא בהסכמה מלאה, חופשית ומדעת.", realCase: { name: 'הלכות בדיקת פוליגרף ביחסי עבודה', desc: 'בתי הדין אסרו על שימוש שגרתי וכפוי בפוליגרף במקומות עבודה כאמצעי הרתעה.' } },
            { id: 27, title: "מינוי מקורבים (ג'ובים)", description: "ראש עיר חדש מינה את חברי סיעתו לתפקידי ניהול מקצועיים בעירייה (כמו גזבר ומהנדס עיר), תוך ביטול הליכי המכרז הקבועים בחוק. קבוצת תושבים עתרה לפסילת המינויים.", rightsOptions: ["הזכות לשוויון", "אינטרס ציבורי", "חופש העיסוק", "הזכות לפרטיות", "זכות הציבור לדעת"], correctRights: ["הזכות לשוויון", "אינטרס ציבורי"], appellant: "התושבים (העותרים)", respondent: "ראש העיר", judgmentOptions: [{ id: "a", text: "לדחות את העתירה בנימוק שלנבחר ציבור יש 'משילות' מלאה וזכות חופשית למנות אנשי שלומו למשרות בכירות כדי שיבצעו את מדיניותו.", correct: false }, { id: "b", text: "לקבל את העתירה, לבטל לאלתר את המינויים ולהורות על עריכת מכרז פומבי, במטרה לשמור על מנהל תקין ועל שוויון הזדמנויות לכל מועמד ראוי.", correct: true }, { id: "c", text: "לקבל את העתירה ולהורות על השעייתו המיידית של ראש העיר מתפקידו והחלפתו בוועדה קרואה של משרד הפנים.", correct: false }], feedbackText: "משרות בשירות הציבורי שייכות לציבור הרחב (האינטרס הציבורי למנהל תקין ומקצועי). עקיפת מכרזים לטובת מקורבים פוליטיים פוסלת מועמדים אחרים ופוגעת אנושות בזכות לשוויון ולחופש העיסוק שלהם.", realCase: { name: 'בג"ץ מינויים פוליטיים (כגון בג"ץ צחי הנגבי)', desc: 'פסקי דין רבים שביססו את העיקרון לפיו מינוי בשירות הציבורי חייב להיות על בסיס כישורים שוויוניים ולא קשרים.' } },
            { id: 28, title: "תחבורה ציבורית בשבת", description: "עירייה בעלת רוב מובהק של תושבים חילונים מבקשת להפעיל קווי אוטובוס בשבת בתוך העיר עבור תושבים שידם אינה משגת רכב. שר התחבורה אוסר זאת מתוקף סמכותו הכללית, בטענה לשמירה על צביון יהודי ועל הסטטוס-קוו.", rightsOptions: ["חופש התנועה", "חופש מדת", "אינטרס ציבורי", "הזכות לקניין", "חופש דת"], correctRights: ["חופש התנועה", "אינטרס ציבורי"], appellant: "העירייה (העותרת)", respondent: "משרד התחבורה", judgmentOptions: [{ id: "a", text: "לדחות את העתירה ולקבוע כי לשלטון המרכזי (השר) יש סמכות חוקית להפעיל שיקול דעת ולהגביל שירותי תחבורה ציבורית ארציים בשבת לשם שמירה על צביון דתי ולאומי.", correct: true }, { id: "b", text: "לקבל את העתירה ולהורות לשר להפעיל תחבורה ציבורית בשבת בכל רחבי המדינה, ללא יוצא מן הכלל, כדי להבטיח את חופש התנועה של המעוטים.", correct: false }, { id: "c", text: "לקבל את העתירה בנימוק שסעיפי פקודת התעבורה אוסרים לחלוטין על שר התחבורה להתחשב בנימוקי דת או מסורת.", correct: false }], feedbackText: "סוגיה פוליטית ומשפטית סבוכה. בג\"ץ קבע בעבר כי חוקי התעבורה מסמיכים את השר לשקול שיקולים רחבים, כולל התחשבות ביום המנוחה והמסורת (סטטוס קוו). רשויות מקומיות עוקפות לעיתים איסור זה על ידי הפעלת הסעות פרטיות במימון עירוני.", realCase: { name: 'בג"ץ מירון (פסקי דין בנושא תחבורה בשבת)', desc: 'בג"ץ גיבה לרוב את החלטות הממשלה שלא לשנות את הסטטוס קוו בתחבורה ארצית, תוך הכרה בסמכות השר.' } },
            { id: 29, title: "חיפוש אקראי בנייד", description: "שוטר סיור עצר אדם לביקורת שגרתית ברחוב, וביקש ממנו למסור את מכשיר הטלפון שלו כדי לבדוק בו הודעות, אף שלא היה חשד מוקדם שהאדם ביצע עבירה. האזרח סירב למסור את המכשיר.", rightsOptions: ["הזכות לפרטיות", "הזכות לכבוד", "שלום הציבור ובטחונו", "חופש המידע", "הזכות לקניין"], correctRights: ["הזכות לפרטיות", "שלום הציבור ובטחונו"], appellant: "האזרח", respondent: "משטרת ישראל", judgmentOptions: [{ id: "a", text: "לדחות את טענות האזרח ולהתיר לשוטר לדרוש קוד נעילה לנייד מכל אדם המעוכב ברחוב כאמצעי לגיטימי ויעיל למיגור פשיעה אקראית.", correct: false }, { id: "b", text: "לקבל את טענות האזרח ולפסול כל חיפוש, תוך קביעה שטלפון חכם דינו כבית, וחיפוש בו (ללא 'חשד סביר' נגד האדם) דורש צו של שופט או הסכמה מלאה ומדעת.", correct: true }, { id: "c", text: "להכשיר את החיפוש בדיעבד, בתנאי שהשוטר יצהיר בבית המשפט שקרא רק הודעות רלוונטיות ולא נכנס לתמונות אישיות.", correct: false }], feedbackText: "הלכת בן חיים (והפסיקה על חומרי מחשב) קבעה שטלפון חכם מכיל את כל עולמו של האדם. חיפוש בו ללא הסמכה חוקית מפורשת (חשד סביר / צו שופט) אינו חוקי, והסכמת האזרח מול שוטר מאיים לא נחשבת לרוב ל'הסכמה מדעת'.", realCase: { name: 'הלכת בן חיים (בג"ץ / ע"פ)', desc: 'פסק הדין שהסדיר את גבולות החיפוש בהסכמה על ידי המשטרה (כולל בטלפונים).' } },
            { id: 30, title: "הדרת חסרי מעמד ממקלט", description: "עירייה החליטה לאסור על כניסת פליטים ועובדים זרים למקלטים הציבוריים שלה בעת אזעקת טילים, בטענה שהמקלטים צפופים ויש לשמור אותם לאזרחי המדינה משלמי המיסים בלבד.", rightsOptions: ["הזכות לשוויון", "הזכות לחיים וביטחון", "זכות הציבור לדעת", "אינטרס ציבורי", "הזכות לקניין"], correctRights: ["הזכות לשוויון", "הזכות לחיים וביטחון"], appellant: "ארגוני סיוע", respondent: "העירייה", judgmentOptions: [{ id: "a", text: "לדחות את העתירה ולקבוע כי חובתה של העירייה היא קודם כל לביטחון תושביה בעלי האזרחות הישראלית.", correct: false }, { id: "b", text: "לקבל את העתירה ולהורות על פתיחת המקלטים לכולם, שכן הזכות לחיים אינה מותנית באזרחות והדרת בני אדם ממקלט בעת מלחמה היא אפליה אסורה המסכנת חיים.", correct: true }, { id: "c", text: "לדחות את העתירה כנגד העירייה, אך להטיל חובה על משרד הפנים לבנות מקלטים נפרדים לאוכלוסייה הזרה בתוך חודש.", correct: false }], feedbackText: "זכויות אדם טבעיות, ובראשן הזכות לחיים, לביטחון ולשלמות הגוף, אינן תלויות במעמד אזרחי או בדרכון. חובת רשות שלטונית לספק שירותי חירום והצלה לכל אדם השוהה בתחומה ללא הפליה.", realCase: { name: 'עתירות אזרחיות בנושאי חירום ורווחה', desc: 'עקרון יסוד במשפט הישראלי לפיו זכויות אדם בסיסיות (חיים, חירות, טיפול רפואי דחוף) ניתנות לכל אדם הנמצא בשטח המדינה.' } }
        ];

        // --- GLOBAL STATE ---
        let state = {
            screen: 'welcome',
            studentName: '',
            sessionCases: [],
            currentRoundIndex: 0,
            scaleAppellant: null,
            scaleRespondent: null,
            activeClickRight: null,
            scores: [],
            selectedJudgment: null,
            reflectionAnswers: { q1: '', q2: '', q3: '' },
            certificateDataUrl: null
        };

        // --- CORE FUNCTIONS ---
        function render() {
            const app = document.getElementById('app');
            app.innerHTML = '';
            
            // Header
            app.innerHTML += `
                <header class="bg-slate-900 text-slate-50 p-5 sm:p-6 flex items-center justify-between border-b-4 border-amber-600">
                    <div class="flex items-center gap-3">
                        <i data-lucide="scale" class="w-7 h-7 sm:w-8 sm:h-8 text-amber-500"></i>
                        <div>
                            <h1 class="text-xl sm:text-2xl font-bold tracking-tight">סימולטור בג"ץ</h1>
                            <p class="text-slate-400 text-xs sm:text-sm">תרגול לבגרות באזרחות</p>
                        </div>
                    </div>
                    ${state.studentName && !['welcome','reflection','certificate'].includes(state.screen) ? `
                    <div class="flex flex-col sm:flex-row items-end sm:items-center gap-1 sm:gap-3">
                        <span class="text-xs font-bold text-slate-900 bg-amber-500 px-2 py-0.5 rounded-sm">
                            תיק ${state.currentRoundIndex + 1} מתוך ${state.sessionCases.length}
                        </span>
                        <span class="text-sm font-medium hidden sm:block text-slate-300">השופט/ת: ${state.studentName}</span>
                    </div>` : ''}
                </header>
            `;

            // Screens
            if (state.screen === 'welcome') app.innerHTML += getWelcomeScreen();
            if (state.screen === 'case') app.innerHTML += getCaseScreen();
            if (state.screen === 'judgment') app.innerHTML += getJudgmentScreen();
            if (state.screen === 'feedback') app.innerHTML += getFeedbackScreen();
            if (state.screen === 'reflection') app.innerHTML += getReflectionScreen();
            if (state.screen === 'certificate') app.innerHTML += getCertificateScreen();

            // Initialize Lucide Icons
            lucide.createIcons();
        }

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function handleNameInput(event) {
            state.studentName = event.target.value;
            const btn = document.getElementById('startBtn');
            if(btn) btn.disabled = state.studentName.trim().length < 2;
            if(event.key === 'Enter' && state.studentName.trim().length >= 2) startGame();
        }

        function startGame() {
            if (state.studentName.trim().length < 2) return;
            const shuffled = [...ALL_CASES].sort(() => 0.5 - Math.random());
            state.sessionCases = shuffled.slice(0, 3);
            state.screen = 'case';
            render();
            scrollToTop();
        }

        // --- DRAG & DROP & CLICK LOGIC ---
        function handleDragStart(e, rightName) {
            e.dataTransfer.setData("text/plain", rightName);
            state.activeClickRight = null;
            render();
        }

        function handleDragOver(e) {
            e.preventDefault();
        }

        function handleDrop(e, targetScale) {
            e.preventDefault();
            const rightName = e.dataTransfer.getData("text/plain");
            placeRightOnScale(rightName, targetScale);
        }

        function handleRightClick(rightName) {
            if (state.scaleAppellant === rightName) { state.scaleAppellant = null; render(); return; }
            if (state.scaleRespondent === rightName) { state.scaleRespondent = null; render(); return; }
            state.activeClickRight = state.activeClickRight === rightName ? null : rightName;
            render();
        }

        function handleScaleClick(targetScale) {
            if (state.activeClickRight) {
                placeRightOnScale(state.activeClickRight, targetScale);
                state.activeClickRight = null;
            } else {
                if (targetScale === 'appellant') state.scaleAppellant = null;
                if (targetScale === 'respondent') state.scaleRespondent = null;
                render();
            }
        }

        function placeRightOnScale(rightName, targetScale) {
            if (targetScale === 'appellant') {
                if (state.scaleRespondent === rightName) state.scaleRespondent = null;
                state.scaleAppellant = rightName;
            } else {
                if (state.scaleAppellant === rightName) state.scaleAppellant = null;
                state.scaleRespondent = rightName;
            }
            render();
        }

        // --- FLOW HANDLERS ---
        function submitIdentification() {
            if (state.scaleAppellant && state.scaleRespondent) {
                state.screen = 'judgment';
                render();
                scrollToTop();
            }
        }

        function selectJudgment(id) {
            state.selectedJudgment = id;
            render();
        }

        function submitJudgment() {
            if (!state.selectedJudgment) return;
            const currentCase = state.sessionCases[state.currentRoundIndex];
            
            let matches = 0;
            if (currentCase.correctRights.includes(state.scaleAppellant)) matches++;
            if (currentCase.correctRights.includes(state.scaleRespondent)) matches++;

            let rightsScore = matches === 2 ? 50 : matches === 1 ? 25 : 0;
            
            const selectedOption = currentCase.judgmentOptions.find(o => o.id === state.selectedJudgment);
            const judgmentScore = selectedOption && selectedOption.correct ? 50 : 0;

            state.scores.push({ rights: rightsScore, judgment: judgmentScore });
            state.screen = 'feedback';
            render();
            scrollToTop();
        }

        function nextCase() {
            if (state.currentRoundIndex < state.sessionCases.length - 1) {
                state.currentRoundIndex++;
                state.scaleAppellant = null;
                state.scaleRespondent = null;
                state.activeClickRight = null;
                state.selectedJudgment = null;
                state.screen = 'case';
            } else {
                state.screen = 'reflection';

            render();
            scrollToTop();

                            state.reflectionAnswers.q3.trim().length > 5;

            state.screen = 'certificate';
            render();
            scrollToTop();

                    </div>
                    <div>
                        <label class="block text-slate-800 font-bold mb-2">3. האם היתה סיטואציה בה לא הסכמתם עם הפסיקה המקובלת בתחום? נמקו.</label>
                        <textarea onkeyup="handleReflectionInput('q3', this.value)" class="w-full p-4 rounded-md border border-slate-300 focus:ring-2 focus:ring-blue-800 outline-none resize-none bg-slate-50" rows="3" maxlength="400" placeholder="אני חושב/ת ש...">${state.reflectionAnswers.q3}</textarea>
                    </div>
                </div>

                <button id="refBtn" onclick="submitReflection()" disabled
                        class="w-full sm:w-auto px-8 py-3 bg-amber-600 hover:bg-amber-700 text-white font-bold rounded-md transition-all disabled:opacity-50 flex items-center justify-center gap-2 cursor-pointer">
                    לסיום והפקת התעודה <i data-lucide="chevron-left" class="w-5 h-5"></i>
                </button>
            </div>
            `;
        }

        function getCertificateScreen() {
            return `
            <div class="p-6 sm:p-12 text-center bg-white relative overflow-hidden min-h-[80vh] flex flex-col items-center justify-center fade-in">
                <div class="relative z-10 w-full max-w-2xl">
                    <i data-lucide="award" class="w-16 h-16 sm:w-20 sm:h-20 text-amber-600 mx-auto mb-4"></i>
                    <h2 class="text-2xl sm:text-3xl font-black text-slate-900 mb-2">התעודה מוכנה!</h2>
                    <div class="w-20 h-1 bg-amber-600 mx-auto mb-6"></div>
                    
                    <p class="text-lg sm:text-xl text-slate-600 mb-8 font-medium">
                        כל הכבוד, <strong>${state.studentName}</strong>.<br/>
                        התעודה המלאה (כולל ציון, פירוט התיקים ופרוטוקול ההתייעצות שלך) הופקה כתמונה.
                    </p>
                    
                    <div id="certResultContainer" class="w-full fade-in mb-8">
                        <img id="certImage" class="max-w-full h-auto rounded-md shadow-xl border-4 border-slate-200 mx-auto" />
                        <p class="text-sm font-bold text-slate-600 mt-4 bg-blue-50 p-3 rounded-md border border-blue-200">
                            <i data-lucide="info" class="w-4 h-4 inline ml-1 text-blue-600"></i>
                            <strong>כדי לשמור ולהגיש:</strong> לחצו לחיצה ארוכה (בנייד) או קליק ימני (במחשב) על התמונה מטה ובחרו ב"שמור תמונה".
                        </p>
                    </div>

                    <div class="flex flex-col sm:flex-row gap-4 justify-center">
                        <button onclick="downloadCertImage()" class="px-6 py-4 bg-blue-900 hover:bg-blue-800 text-white font-bold rounded-md transition-all shadow-md flex items-center justify-center gap-2 text-lg cursor-pointer">
                            הורדת תעודה (כקובץ) <i data-lucide="download" class="w-6 h-6"></i>
                        </button>
                        <button onclick="restart()" class="px-6 py-4 bg-white border-2 border-slate-300 hover:bg-slate-50 text-slate-800 font-bold rounded-md transition-all flex items-center justify-center gap-2 text-lg cursor-pointer">
                            התחל מחדש <i data-lucide="chevron-right" class="w-6 h-6"></i>
                        </button>
                    </div>
                </div>
                
                <canvas id="exportCanvas" style="display:none;"></canvas>
            </div>
            `;
        }

        // --- CANVAS CERTIFICATE GENERATOR ---
        function wrapTextCanvas(context, text, x, y, maxWidth, lineHeight) {
            if (!text) return y;
            const words = text.split(' ');
            let line = '';
            let currentY = y;
            for (let n = 0; n < words.length; n++) {
                const testLine = line + words[n] + ' ';
                const metrics = context.measureText(testLine);
                if (metrics.width > maxWidth && n > 0) {
                    context.fillText(line, x, currentY);
                    line = words[n] + ' ';
                    currentY += lineHeight;
                } else {
                    line = testLine;
                }
            }
            context.fillText(line, x, currentY);
            return currentY + lineHeight;
        }

        function generateCertificateImage() {
            const canvas = document.getElementById('exportCanvas');
            if (!canvas) return null;
            const ctx = canvas.getContext('2d');
            
            canvas.width = 1000;
            canvas.height = 1400;
            
            // Background
            ctx.fillStyle = '#f8fafc'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Borders
            ctx.strokeStyle = '#0f172a'; 
            ctx.lineWidth = 15;
            ctx.strokeRect(30, 30, canvas.width - 60, canvas.height - 60);
            ctx.strokeStyle = '#d4af37'; 
            ctx.lineWidth = 4;
            ctx.strokeRect(45, 45, canvas.width - 90, canvas.height - 90);

            ctx.direction = 'rtl';
            ctx.fillStyle = '#0f172a';
            ctx.textAlign = 'center';
            
            // Title
            ctx.font = 'bold 50px Arial, Heebo, sans-serif';
            ctx.fillText('תעודת מינוי שיפוטי', canvas.width / 2, 120);
            
            ctx.fillStyle = '#d4af37';
            ctx.fillRect(canvas.width / 2 - 100, 140, 200, 4);

            // Subtitle
            ctx.fillStyle = '#334155'; 
            ctx.font = '28px Arial, Heebo, sans-serif';
            ctx.fillText('מוענקת בזאת להרכב בראשות השופט/ת:', canvas.width / 2, 210);
            
            ctx.fillStyle = '#0f172a';
            ctx.font = 'bold 46px Arial, Heebo, sans-serif';
            ctx.fillText(state.studentName, canvas.width / 2, 270);

            // Score
            const currentTotalScore = state.scores.reduce((a, b) => a + (b.rights + b.judgment), 0);
            const currentMaxScore = state.sessionCases.length * 100;
            const percentage = currentMaxScore > 0 ? Math.round((currentTotalScore / currentMaxScore) * 100) : 0;

            ctx.fillStyle = '#1e40af'; 
            ctx.font = 'bold 32px Arial, Heebo, sans-serif';
            ctx.fillText(`התאמה לעקרונות המשפט החוקתי: ${percentage}%`, canvas.width / 2, 350);

            // Cases List
            ctx.fillStyle = '#475569';
            ctx.font = '24px Arial, Heebo, sans-serif';
            ctx.fillText('התיקים שנידונו במושב זה:', canvas.width / 2, 420);

            ctx.fillStyle = '#0f172a';
            ctx.font = 'bold 26px Arial, Heebo, sans-serif';
            state.sessionCases.forEach((c, idx) => {
                ctx.fillText(`${idx + 1}. ${c.title}`, canvas.width / 2, 470 + (idx * 40));
            });

            // Reflection Section
            ctx.textAlign = 'right';
            let currentY = 620;
            
            ctx.fillStyle = '#d4af37';
            ctx.fillRect(canvas.width / 2 - 50, currentY - 30, 100, 3);
            
            ctx.fillStyle = '#0f172a';
            ctx.font = 'bold 30px Arial, Heebo, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('פרוטוקול התייעצות אישית', canvas.width / 2, currentY);
            
            ctx.textAlign = 'right';
            currentY += 60;
            const rightMargin = canvas.width - 80;
            const textMaxWidth = canvas.width - 160;

            ctx.fillStyle = '#334155';
            ctx.font = 'bold 22px Arial, Heebo, sans-serif';
            currentY = wrapTextCanvas(ctx, 'ש: הציגו שני דברים שלמדתם או גיליתם במהלך הסימולציה.', rightMargin, currentY, textMaxWidth, 30);
            ctx.fillStyle = '#0f172a';
            ctx.font = '22px Arial, Heebo, sans-serif';
            currentY = wrapTextCanvas(ctx, `ת: ${state.reflectionAnswers.q1}`, rightMargin, currentY, textMaxWidth, 30);
            currentY += 30;

            ctx.fillStyle = '#334155';
            ctx.font = 'bold 22px Arial, Heebo, sans-serif';
            currentY = wrapTextCanvas(ctx, 'ש: מה היה האירוע המורכב ביותר להכרעה לדעתכם? מדוע?', rightMargin, currentY, textMaxWidth, 30);
            ctx.fillStyle = '#0f172a';
            ctx.font = '22px Arial, Heebo, sans-serif';
            currentY = wrapTextCanvas(ctx, `ת: ${state.reflectionAnswers.q2}`, rightMargin, currentY, textMaxWidth, 30);
            currentY += 30;

            ctx.fillStyle = '#334155';
            ctx.font = 'bold 22px Arial, Heebo, sans-serif';
            currentY = wrapTextCanvas(ctx, 'ש: האם היתה סיטואציה בה לא הסכמתם עם הפסיקה המקובלת? נמקו.', rightMargin, currentY, textMaxWidth, 30);
            ctx.fillStyle = '#0f172a';
            ctx.font = '22px Arial, Heebo, sans-serif';
            currentY = wrapTextCanvas(ctx, `ת: ${state.reflectionAnswers.q3}`, rightMargin, currentY, textMaxWidth, 30);

            state.certificateDataUrl = canvas.toDataURL('image/png');
            
            // Set the image on the screen immediately
            const imgElement = document.getElementById('certImage');
            if (imgElement) imgElement.src = state.certificateDataUrl;
        }

        function downloadCertImage() {
            if (!state.certificateDataUrl) return;
            try {
                const link = document.createElement('a');
                link.download = `תעודת_בגץ_${state.studentName.replace(/\s+/g, '_')}.png`;
                link.href = state.certificateDataUrl;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (e) {
                console.error("Download blocked", e);
                alert("ההורדה נחסמה. תוכלו לשמור את התמונה באמצעות קליק ימני (או לחיצה ארוכה) על התעודה שעל המסך.");
            }
        }

        // Init
        render();

    </script>
</body>
</html>
